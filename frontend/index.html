<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>婚礼宾客统计系统</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💒</text></svg>">
<style>
  :root {
    --bg: #ffffff;
    --card: #fffbf9;
    --card-elevated: #ffffff;
    --ink: #3d3532;
    --ink-soft: #5a504c;
    --muted: #a89e98;
    --primary: #c9918a;
    --primary-dark: #b07069;
    --primary-light: #f0d1cd;
    --gold: #d4b896;
    --gold-light: #efe0cc;
    --line: #f2e8e4;
    --line-light: #f9f3f0;
    --ok: #6d9a7e;
    --ok-bg: #eaf3ed;
    --warn: #c09555;
    --warn-bg: #faf1e4;
    --danger: #c0675a;
    --danger-bg: #fae8e5;
    --shadow-sm: 0 1px 3px rgba(61,53,50,.04), 0 1px 2px rgba(61,53,50,.05);
    --shadow: 0 4px 16px rgba(61,53,50,.06), 0 1px 3px rgba(61,53,50,.03);
    --shadow-lg: 0 12px 40px rgba(61,53,50,.1), 0 4px 12px rgba(61,53,50,.03);
    --font-display: Georgia, 'Noto Serif SC', 'Source Han Serif SC', 'STSong', 'SimSun', serif;
    --font-body: -apple-system, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
    --radius: 12px;
    --radius-lg: 18px;
    --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: var(--font-body);
    font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* subtle grain texture on body */
  body::before {
    content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    opacity: 0.18;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  }

  ::selection { background: #f0c6c9; color: var(--ink); }

  header {
    background: linear-gradient(135deg, #e8b4b8 0%, #f0c6c9 50%, #f2d0d2 100%);
    color: var(--ink); padding: 0 32px;
    display: flex; align-items: center; gap: 32px; flex-wrap: wrap;
    height: 60px;
    border-bottom: 1px solid rgba(201,145,138,.15);
    box-shadow: 0 2px 12px rgba(201,145,138,.1);
  }
  header h1 {
    margin: 0; font-size: 20px; letter-spacing: 2px;
    font-family: var(--font-display); font-weight: 600;
    color: #fff;
    text-shadow: 0 1px 3px rgba(160,80,72,.15);
    display: flex; align-items: center; gap: 10px;
  }
  header h1::after {
    content: ''; display: inline-block; width: 1px; height: 22px;
    background: rgba(255,255,255,.35); margin-left: 8px;
  }
  nav { display: flex; gap: 4px; }
  nav button {
    background: transparent; color: rgba(255,255,255,.7); border: none;
    padding: 8px 18px; border-radius: 8px; cursor: pointer;
    font-size: 13px; font-family: var(--font-body); font-weight: 500;
    transition: all var(--transition); letter-spacing: 0.3px;
    position: relative;
  }
  nav button:hover { color: #fff; background: rgba(255,255,255,.2); }
  nav button.active {
    color: var(--ink); background: rgba(255,255,255,.65); font-weight: 600;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  nav button.active::after {
    content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 20px; height: 2px; background: var(--primary-dark); border-radius: 1px;
  }

  #stats-bar {
    display: none; gap: 12px; padding: 20px 32px 0; flex-wrap: wrap;
  }
  #stats-bar.visible { display: flex; }
  .stat {
    background: var(--card-elevated); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 14px 20px; min-width: 110px;
    box-shadow: var(--shadow-sm); transition: all var(--transition);
    position: relative; overflow: hidden;
  }
  .stat::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px; background: linear-gradient(90deg, #e8b4b8, var(--gold-light));
    opacity: 0; transition: opacity var(--transition);
  }
  .stat:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
  .stat:hover::before { opacity: 1; }
  .stat .num {
    font-size: 26px; font-weight: 700; color: var(--primary-dark);
    font-family: var(--font-display); line-height: 1.1;
  }
  .stat .lbl {
    color: var(--muted); font-size: 11px; margin-top: 4px;
    text-transform: uppercase; letter-spacing: 0.8px; font-weight: 500;
  }
  .stat.over .num { color: var(--danger); }
  .stat.over::before { background: linear-gradient(90deg, var(--danger), var(--danger-bg)); opacity: 1; }

  main { padding: 20px 32px 60px; }
  .tab-page { display: none; }
  .tab-page.active { display: block; animation: fadeIn 0.3s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .toolbar {
    display: flex; gap: 10px; align-items: center; margin-bottom: 18px; flex-wrap: wrap;
  }
  .toolbar .hint { color: var(--muted); font-size: 12px; letter-spacing: 0.2px; }
  .spacer { flex: 1; }

  button.btn {
    background: var(--primary); color: #fff; border: none;
    border-radius: 8px; padding: 9px 18px; cursor: pointer;
    font-size: 13px; font-family: var(--font-body); font-weight: 500;
    transition: all var(--transition); letter-spacing: 0.3px;
  }
  button.btn:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  button.btn:active { transform: translateY(0); }
  button.btn.ghost {
    background: transparent; color: var(--ink-soft);
    border: 1px solid var(--line);
  }
  button.btn.ghost:hover { border-color: var(--primary); color: var(--primary-dark); background: rgba(184,145,138,.04); }
  button.btn.sm { padding: 4px 12px; font-size: 12px; border-radius: 6px; }
  button.btn.danger {
    background: transparent; color: var(--danger); border: 1px solid rgba(192,103,90,.25);
  }
  button.btn.danger:hover { border-color: var(--danger); background: var(--danger-bg); }

  input, select, textarea {
    border: 1px solid var(--line); border-radius: 8px; padding: 8px 12px;
    font-size: 14px; font-family: var(--font-body); background: var(--card-elevated);
    color: var(--ink); transition: all var(--transition);
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(184,145,138,.12);
  }

  /* ---- 会场平面图 ---- */
  .floor-layout { display: flex; gap: 0; align-items: flex-start; }
  #venue-box { flex: 618; min-width: 0; padding-right: 20px; border-right: 1px solid var(--line); margin-right: 20px; }
  #venue {
    position: relative; background: #fffcf8; margin: 0 auto;
    border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); overflow: hidden;
    background-image:
      linear-gradient(var(--line-light) 1px, transparent 1px),
      linear-gradient(90deg, var(--line-light) 1px, transparent 1px);
  }
  .stage {
    position: absolute;
    background: linear-gradient(180deg, #e8dcc6, #dbc9a2);
    border: 1px solid #cbb88c; border-top: none;
    border-radius: 0 0 50% 50% / 0 0 100% 100%;
    display: flex; align-items: center; justify-content: center;
    color: #8a7850; font-weight: 700; letter-spacing: 6px; z-index: 1;
    padding-bottom: 8px;
    font-family: var(--font-display); font-size: 14px;
    box-shadow: 0 4px 12px rgba(196,168,107,.12);
  }
  .aisle {
    position: absolute; z-index: 1;
    background: linear-gradient(180deg, rgba(196,168,107,.1), rgba(196,168,107,.03));
    border-left: 1px dashed rgba(196,168,107,.3);
    border-right: 1px dashed rgba(196,168,107,.3);
    display: flex; align-items: flex-end; justify-content: center; padding-bottom: 10px;
  }
  .aisle span {
    writing-mode: vertical-lr; color: rgba(196,168,107,.5); font-weight: 600;
    letter-spacing: 8px; font-size: 12px;
  }
  .table-dot {
    position: absolute; border-radius: 50%; z-index: 2;
    background: radial-gradient(circle at 38% 28%, #ffffff 0%, #faf4ee 70%, #f0e6dc 100%);
    border: 2px solid var(--primary); box-shadow: var(--shadow-sm);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: grab; user-select: none; touch-action: none; text-align: center; line-height: 1.15;
    transition: box-shadow 0.15s ease, border-color 0.15s ease;
  }
  .table-dot:hover { box-shadow: var(--shadow); }
  .table-dot.dragging { opacity: .8; cursor: grabbing; z-index: 5; box-shadow: var(--shadow-lg); }
  .table-dot.dragover { border-color: var(--gold); border-style: dashed; background: radial-gradient(circle, #fdf8ef, #faf3e5); }
  .table-dot.empty { border-style: dashed; border-color: var(--line); }
  .table-dot.overfull { border-color: var(--danger); }
  .table-dot .tno {
    font-weight: 700; color: var(--primary-dark);
    font-family: var(--font-display);
  }
  .table-dot.overfull .tocc { color: var(--danger); font-weight: 700; }
  .table-dot .tocc { color: var(--muted); font-size: 0.85em; }
  .table-dot .tlbl {
    font-size: .72em; color: var(--muted); max-width: 88%;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #side-panel {
    flex: 382; min-width: 0;
    display: flex; flex-direction: column; gap: 14px;
    max-height: calc(100vh - 160px); min-height: 0;
  }
  .side-section {
    background: var(--card-elevated); border: 1px solid var(--line);
    border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow);
    overflow-y: auto; min-height: 0;
  }
  .side-section.distribution { flex: 1; }
  .side-section.unassigned { flex-shrink: 0; max-height: 40%; }
  .side-section h4 {
    margin: 0 0 6px; font-size: 14px;
    font-family: var(--font-display); font-weight: 600;
  }
  .side-section .sub { color: var(--muted); font-size: 12px; margin-bottom: 10px; }
  #distribution-list {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .dist-table {
    background: var(--card); border: 1px solid var(--line-light);
    border-radius: var(--radius); padding: 8px 10px;
  }
  .dist-header {
    display: flex; align-items: center; gap: 8px; padding: 6px 0 4px;
    border-bottom: 1px solid var(--line-light); margin-bottom: 4px;
  }
  .dist-header .tno {
    font-weight: 700; color: var(--primary-dark); font-family: var(--font-display);
    font-size: 13px;
  }
  .dist-header .tlbl { color: var(--muted); font-size: 11px; }
  .dist-header .occ {
    margin-left: auto; font-size: 12px; color: var(--ink-soft); font-weight: 500;
  }
  .dist-header .occ.over { color: var(--danger); font-weight: 700; }
  .dist-header .occ.full { color: var(--ok); }
  .dist-guests {
    display: flex; flex-wrap: wrap; gap: 3px 8px; padding: 2px 0;
  }
  .dist-guest {
    font-size: 12px; color: var(--ink-soft); line-height: 1.6;
  }
  .dist-guest .name { color: var(--ink); font-weight: 500; }
  .dist-guest .sz { color: var(--muted); }
  .dist-guest.declined { opacity: .45; text-decoration: line-through; }
  .dist-empty { font-size: 11px; color: var(--muted); padding: 2px 0; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; align-content: flex-start; }
  .chip {
    background: var(--card); border: 1px solid var(--line); border-radius: 20px;
    padding: 4px 12px; font-size: 13px; cursor: grab; user-select: none;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all var(--transition);
  }
  .chip:hover { border-color: var(--primary); box-shadow: var(--shadow-sm); transform: translateY(-1px); }
  .chip .n { color: var(--primary-dark); font-weight: 600; }
  .chip.declined { opacity: .4; text-decoration: line-through; }
  .chip.pending-status { border-style: dashed; }
  .chip .sz {
    background: var(--gold); color: #fff; border-radius: 10px;
    padding: 0 7px; font-size: 10px; font-weight: 600;
  }
  .empty-note { color: var(--muted); font-size: 12px; padding: 8px 0; }

  .detail-row {
    display: flex; align-items: center; gap: 10px; padding: 10px 0;
    border-bottom: 1px solid var(--line-light);
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-row .name { font-weight: 600; min-width: 72px; }
  .detail-row .meta { color: var(--muted); font-size: 12px; flex: 1; }

  /* ---- 表格 ---- */
  table.list {
    width: 100%; border-collapse: separate; border-spacing: 0;
    background: var(--card-elevated); border-radius: var(--radius-lg);
    overflow: hidden; box-shadow: var(--shadow);
    border: 1px solid var(--line);
  }
  table.list th, table.list td {
    padding: 11px 14px; text-align: left;
    border-bottom: 1px solid var(--line-light);
  }
  table.list th {
    background: linear-gradient(180deg, var(--card), var(--line-light));
    font-weight: 600; font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.8px;
    position: sticky; top: 0; z-index: 1;
  }
  table.list tr:last-child td { border-bottom: none; }
  table.list tbody tr { transition: background var(--transition); }
  table.list tbody tr:hover { background: rgba(184,145,138,.03); }
  table.list td .ops { display: flex; gap: 6px; }
  table.list select.inline {
    padding: 4px 8px; font-size: 12px; border-radius: 6px;
    background: var(--card); border: 1px solid var(--line);
  }
  .tag {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
  }
  .tag.ok { background: var(--ok-bg); color: var(--ok); }
  .tag.pending { background: var(--warn-bg); color: var(--warn); }
  .tag.bad { background: var(--danger-bg); color: var(--danger); }
  .tag.plain { background: var(--line-light); color: var(--muted); }

  /* ---- 批量操作 ---- */
  .batch-bar {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    background: linear-gradient(135deg, rgba(184,145,138,.06), rgba(196,168,107,.06));
    border: 1px solid var(--line);
    border-radius: var(--radius); padding: 10px 16px; margin-bottom: 12px;
  }
  .batch-bar .count { font-weight: 600; font-size: 13px; white-space: nowrap; color: var(--primary-dark); }
  table.list input[type="checkbox"] {
    width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer;
  }

  /* ---- 设置 ---- */
  .settings-card {
    background: var(--card-elevated); border: 1px solid var(--line);
    border-radius: var(--radius-lg); padding: 28px; max-width: 500px;
    box-shadow: var(--shadow);
  }
  .settings-card h3 {
    font-family: var(--font-display); font-weight: 600;
    font-size: 20px; letter-spacing: 0.5px;
  }
  .form-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .form-row label { font-size: 12px; color: var(--muted); font-weight: 500; letter-spacing: 0.3px; }
  .form-row .desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 18px; }
  .form-grid .full { grid-column: 1 / -1; }

  /* ---- 弹窗 ---- */
  #modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(44,40,37,.4);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    display: none; align-items: center; justify-content: center; z-index: 50;
  }
  #modal-backdrop.show { display: flex; }
  #modal {
    background: var(--card-elevated); border-radius: var(--radius-lg);
    padding: 28px 30px; width: min(540px, 92vw); max-height: 86vh;
    overflow: auto; box-shadow: var(--shadow-lg);
    border: 1px solid var(--line);
    animation: modalIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  #modal h3 {
    margin: 0 0 20px; font-size: 20px;
    font-family: var(--font-display); font-weight: 600;
  }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; }
  .checkbox-row {
    display: flex; align-items: flex-start; gap: 10px;
    background: var(--line-light); border-radius: var(--radius);
    padding: 12px; border: 1px solid var(--line);
  }
  .checkbox-row input { margin-top: 2px; }
  .checkbox-row .sub { font-size: 12px; color: var(--muted); margin-top: 3px; }

  /* ---- Toast ---- */
  #toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(8px);
    background: #4a3d3a; color: #fff; padding: 12px 22px; border-radius: var(--radius);
    font-size: 13px; font-weight: 500; display: none; z-index: 99; max-width: 80vw;
    box-shadow: var(--shadow-lg); letter-spacing: 0.2px;
    animation: toastIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(16px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  #toast.show { display: block; }
  #toast.error { background: var(--danger); }

  /* ---- 交换模式 ---- */
  #swap-mode-btn.active-mode { background: var(--gold); color: #fff; border-color: var(--gold); }
  .table-dot.swap-source {
    border-color: var(--gold) !important; border-width: 3px;
    animation: swap-pulse 1.5s ease-in-out infinite;
  }
  @keyframes swap-pulse {
    0%, 100% { box-shadow: 0 0 6px rgba(196,168,107,.3); }
    50% { box-shadow: 0 0 20px rgba(196,168,107,.5); }
  }

  /* ---- 排序表头 ---- */
  th.sortable { cursor: pointer; user-select: none; transition: color var(--transition); }
  th.sortable:hover { color: var(--primary-dark); }
  .sort-arrow { font-size: 10px; opacity: .5; }

  /* ---- 自定义滚动条 ---- */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<header>
  <h1 id="site-title">💒 Our Wedding</h1>
  <nav>
    <button data-tab="floor" class="active">🪑 桌位图</button>
    <button data-tab="guests">📋 宾客名单</button>
    <button data-tab="tables">🛠 桌子管理</button>
    <button data-tab="settings">⚙️ 设置</button>
  </nav>
</header>

<section id="stats-bar"></section>

<main>
  <div class="tab-page active" id="tab-floor">
    <div class="toolbar">
      <button class="btn" onclick="openGuestModal()">＋ 新增宾客</button>
      <button class="btn" onclick="openTableModal()">＋ 新增桌子</button>
      <button class="btn ghost" onclick="resetPositions()">🔄 重新排列</button>
      <button class="btn ghost" id="swap-mode-btn" onclick="toggleSwapMode()">⇄ 调换座位</button>
      <label class="hint" style="display:inline-flex;align-items:center;gap:6px">🔍 缩放
        <input type="range" id="zoom-range" min="50" max="150" value="100" step="10"
               style="width:110px;padding:0" oninput="setZoom(this.value)">
        <span id="zoom-val">100%</span>
      </label>
    </div>
    <div class="floor-layout">
      <div id="venue-box">
        <div id="venue"></div>
      </div>
      <div id="side-panel">
        <div class="side-section distribution">
          <h4>📊 宾客分布明细</h4>
          <div id="distribution-list"></div>
        </div>
        <div class="side-section unassigned">
          <h4>⏳ 未安排宾客 <span id="unassigned-count"></span></h4>
          <div class="sub">拖动名牌到平面图的桌子上入座</div>
          <div class="chips" id="unassigned-chips"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="tab-page" id="tab-guests">
    <div class="toolbar">
      <button class="btn" onclick="openGuestModal()">＋ 新增宾客</button>
      <a class="btn ghost" href="/api/guests/export" style="text-decoration:none">⬇️ 导出 Excel</a>
      <button class="btn ghost" onclick="openImportModal()">⬆️ 导入 Excel</button>
      <select id="guest-filter" onchange="renderGuestsTable()">
        <option value="">全部宾客</option>
        <option value="unseated">未排座</option>
        <option value="seated">已排座</option>
        <option value="已确认">已确认</option>
        <option value="待确认">待确认</option>
        <option value="不参加">不参加</option>
      </select>
      <input id="guest-search" placeholder="搜索姓名 / 家属 / 备注…" style="width:240px"
             oninput="renderGuestsTable()">
      <div class="spacer"></div>
      <span class="hint">点击表头排序 · 状态列可直接下拉修改</span>
    </div>
    <div class="batch-bar" id="batch-bar" style="display:none">

<div id="modal-backdrop"><div id="modal"></div></div>
<div id="toast"></div>

<script>
let state = null;          // /api/overview 的数据
let currentTab = 'floor';

/* ================= 基础工具 ================= */

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 2600);
}

async function api(method, url, body) {
  const res = await fetch(url, {
    method,
    headers: body ? {'Content-Type': 'application/json'} : undefined,
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    let detail = res.statusText;
    try { detail = (await res.json()).detail || detail; } catch (e) {}
    const err = new Error(typeof detail === 'string' ? detail : JSON.stringify(detail));
    err.status = res.status;
    throw err;
  }
  return res.json();
}

/* 统一处理「容量不足 409 → 询问是否强制」的写操作 */
async function apiWithForce(method, url, body) {
  try {
    return await api(method, url, body);
  } catch (e) {
    if (e.status === 409 && e.message.includes('容量不足') &&
        confirm(e.message + '\n\n是否仍然强制安排？')) {
      return api(method, url, {...body, force: true});
    }
    throw e;
  }
}

async function reload() {
  state = await api('GET', '/api/overview');
  renderAll();
}

function guestById(id) { return state.guests.find(g => g.id === id); }
function tableByNo(no) { return state.tables.find(t => t.table_no === no); }

/* ================= 页签 ================= */

document.querySelectorAll('nav button').forEach(btn => {
  btn.onclick = () => {
    currentTab = btn.dataset.tab;
    document.querySelectorAll('nav button').forEach(b => b.classList.toggle('active', b === btn));
    document.querySelectorAll('.tab-page').forEach(p =>
      p.classList.toggle('active', p.id === 'tab-' + currentTab));
    document.getElementById('stats-bar').classList.toggle('visible', currentTab === 'guests');
    if (currentTab === 'floor' && state) renderFloor();
  };
});

/* ================= 渲染 ================= */

function renderAll() {
  renderTitle();
  renderStats();
  renderFloor();
  renderGuestsTable();
  renderTablesTable();
  renderSettings();
}

// 占座人数：已确认按确认人数，待确认按预计人数，不参加不占座（与后端口径一致）
function seatSize(g) {
  if (g.confirm_status === '不参加') return 0;
  return g.confirm_status === '已确认' ? g.confirmed_size : g.party_size;
}

function renderStats() {
  const s = state.stats;
  const overBudget = s.budget_total > 0 && s.expected > s.budget_total;
  const items = [
    {lbl: '预算合计', num: s.invited_total},
    {lbl: '预计出席', num: s.expected, over: overBudget},
    {lbl: '已确认到场', num: s.confirmed},
    {lbl: '待确认', num: s.pending},
    {lbl: '不参加', num: s.declined},
    {lbl: '已安排桌位', num: s.seated},
    {lbl: '未安排', num: s.unseated},
    {lbl: '邀请函已发', num: `${s.invite_sent}/${s.guest_count}`},
  ];
  document.getElementById('stats-bar').innerHTML = items.map(i => `
    <div class="stat${i.over ? ' over' : ''}">
      <div class="num">${i.num}</div><div class="lbl">${i.lbl}</div>
    </div>`).join('');
}

function chipHtml(g) {
  const cls = ['chip'];
  if (g.confirm_status === '不参加') cls.push('declined');
  if (g.confirm_status === '待确认') cls.push('pending-status');
  const title = `${g.name}｜预算${g.party_size}人/确认${g.confirmed_size}人` +
    (g.family_names ? `｜家属：${g.family_names}` : '') +
    `｜${g.invite_status}｜${g.confirm_status}` + (g.note ? `｜${g.note}` : '');
  return `<span class="${cls.join(' ')}" draggable="true" data-gid="${g.id}"
      title="${esc(title)}" onclick="openGuestModal(${g.id})">
      <span class="n">${esc(g.name)}</span><span class="sz">${seatSize(g)}</span>
    </span>`;
}

/* ---- 会场平面图（按米等比例绘制） ---- */

// 半圆舞台的包围盒（单位：米，凸向场内，居中贴顶）
function stageRect(cfg) {
  const w = Math.min(10, cfg.venue_width * 0.45);
  const d = Math.min(3, cfg.venue_depth * 0.12);
  return { x: (cfg.venue_width - w) / 2, y: 0, w, h: d };
}
// 场地中线通道：从舞台下方贯穿到场底，把桌区分为左右两边
function aisleRect(cfg) {
  const s = stageRect(cfg);
  const w = Math.max(1.2, Math.min(2.4, cfg.venue_width * 0.1));
  return { x: (cfg.venue_width - w) / 2, y: s.h, w, h: cfg.venue_depth - s.h };
}
function circleHitsRect(r, cx, cy, rad) {
  return cx > r.x - rad && cx < r.x + r.w + rad && cy > r.y - rad && cy < r.y + r.h + rad;
}

// 桌号排序值：纯数字桌号按数值升序，其余（主桌等）排在数字桌之后
function tableNoOrder(no) {
  return /^\d+$/.test(no) ? parseInt(no, 10) : Infinity;
}

// 给没有坐标的桌子自动找空位（避开半圆舞台/中线通道/已摆放的桌）：
// 每行先排左区 L→R，再排右区 L→R（与左区镜像对称）；主桌 = 右区第一行最靠近过道的位置
function autoLayout(tables, cfg) {
  const D = cfg.table_diameter, rad = D / 2;
  const stage = stageRect(cfg), aisle = aisleRect(cfg);
  const margin = rad + 0.6, step = D + cfg.table_gap;
  const minDist = Math.min(D + 0.25, step * 0.99);
  const placed = tables.filter(t => t.x != null && t.y != null).map(t => [t.x, t.y]);
  const pos = {};
  const isMain = t => t.table_no === '主桌';
  const firstRowY = stage.h + rad + 0.6;
  // 预生成对称槽位：左区 L→R → 右区 L→R（镜像），逐行重复
  const slots = [];
  let mainSlotIdx = -1;
  for (let y = firstRowY; y <= cfg.venue_depth - margin; y += step) {
    const leftXs = [];
    for (let x = margin; x <= cfg.venue_width - margin; x += step) {
      if (x < aisle.x && !circleHitsRect(stage, x, y, rad) && !circleHitsRect(aisle, x, y, rad))
        leftXs.push(x);
    }
    for (const x of leftXs) slots.push({ x, y });
    const rightXs = leftXs.map(x => cfg.venue_width - x)
      .filter(x => x <= cfg.venue_width - margin
        && !circleHitsRect(stage, x, y, rad) && !circleHitsRect(aisle, x, y, rad))
      .sort((a, b) => a - b);
    if (mainSlotIdx < 0 && rightXs.length) mainSlotIdx = slots.length;
    for (const x of rightXs) slots.push({ x, y });
  }
  // 主桌固定放右区首位；其余按桌号升序填入剩余槽位
  const pending = tables.filter(t => t.x == null || t.y == null);
  const mainTable = pending.find(t => isMain(t));
  if (mainTable && mainSlotIdx >= 0) {
    const s = slots[mainSlotIdx];
    if (!placed.some(([px, py]) => (px - s.x) ** 2 + (py - s.y) ** 2 < minDist ** 2)) {
      pos[mainTable.table_no] = { x: s.x, y: s.y };
      placed.push([s.x, s.y]);
    }
  }
  const queue = pending.filter(t => !pos[t.table_no]).sort((a, b) =>
    tableNoOrder(a.table_no) - tableNoOrder(b.table_no) ||
    a.table_no.localeCompare(b.table_no, 'zh'));
  for (const t of queue) {
    let found = null;
    for (const slot of slots) {
      if (placed.some(([px, py]) => (px - slot.x) ** 2 + (py - slot.y) ** 2 < minDist ** 2)) continue;
      found = { x: slot.x, y: slot.y };
      break;
    }
    found = found || { x: cfg.venue_width / 2, y: cfg.venue_depth - margin };
    pos[t.table_no] = found;
    placed.push([found.x, found.y]);
  }
  return pos;
}

let zoomFactor = 1;
function setZoom(v) {
  zoomFactor = v / 100;
  document.getElementById('zoom-val').textContent = v + '%';
  if (state) renderFloor();
}

function renderFloor() {
  const cfg = state.config;
  const venue = document.getElementById('venue');
  const box = document.getElementById('venue-box');
  // 默认「适应窗口」：宽、高双向受限，整个会场一屏可见；缩放滑块在此基础上放大缩小
  const boxW = box.clientWidth || 800;
  const boxTop = box.getBoundingClientRect().top;
  const availH = Math.max(320, window.innerHeight - Math.max(140, boxTop) - 36);
  const fit = Math.min(boxW / cfg.venue_width, availH / cfg.venue_depth);
  const scale = Math.max(6, fit * zoomFactor); // px / 米
  const px = m => m * scale;
  venue.style.width = px(cfg.venue_width) + 'px';
  venue.style.height = px(cfg.venue_depth) + 'px';
  venue.style.backgroundSize = `${px(1)}px ${px(1)}px`;  // 1米网格



  const stage = stageRect(cfg), aisle = aisleRect(cfg);
  const autoPos = autoLayout(state.tables, cfg);
  const d = cfg.table_diameter;
  const fontBase = Math.max(9, Math.min(15, px(d) * 0.17));

  const dots = state.tables.map(t => {
    const p = (t.x != null && t.y != null) ? { x: t.x, y: t.y } : autoPos[t.table_no];
    const over = t.occupied > t.effective_capacity;
    const cls = ['table-dot'];
    if (over) cls.push('overfull');
    if (!t.guests.length) cls.push('empty');
    const title = `${t.table_no}${t.label ? '｜' + t.label : ''}｜${t.occupied}/${t.effective_capacity}人` +
      (t.guests.length ? `｜${t.guests.map(g => g.name).join('、')}` : '｜空桌') +
      (t.x == null ? '｜（自动摆放，拖动后保存位置）' : '');
    return `<div class="${cls.join(' ')}" data-table="${esc(t.table_no)}"
        data-x="${p.x}" data-y="${p.y}" title="${esc(title)}"
        style="left:${px(p.x - d / 2)}px; top:${px(p.y - d / 2)}px;
               width:${px(d)}px; height:${px(d)}px; font-size:${fontBase}px">
        <span class="tno" style="font-size:${fontBase * 1.15}px">${esc(t.table_no)}</span>
        ${t.label ? `<span class="tlbl">${esc(t.label)}</span>` : ''}
        <span class="tocc">${t.occupied}/${t.effective_capacity}</span>
      </div>`;
  }).join('');

  venue.innerHTML = `
    <div class="stage" style="left:${px(stage.x)}px; top:${px(stage.y)}px;
         width:${px(stage.w)}px; height:${px(stage.h)}px; font-size:${Math.max(11, px(1) * 0.5)}px">舞台</div>
    <div class="aisle" style="left:${px(aisle.x)}px; top:${px(aisle.y)}px;
         width:${px(aisle.w)}px; height:${px(aisle.h)}px"><span>通 道</span></div>
    ${dots}`;

  // 宾客分布明细
  const distList = document.getElementById('distribution-list');
  const sortedTables = [...state.tables].sort((a, b) =>
    tableNoOrder(a.table_no) - tableNoOrder(b.table_no) || a.table_no.localeCompare(b.table_no, 'zh'));
  distList.innerHTML = sortedTables.map(t => {
    const over = t.occupied > t.effective_capacity;
    const full = !over && t.occupied === t.effective_capacity;
    const occCls = over ? ' over' : full ? ' full' : '';
    const guestsHtml = t.guests.length
      ? t.guests.map(g => {
          const cls = g.confirm_status === '不参加' ? ' declined' : '';
          return `<span class="dist-guest${cls}"><span class="name">${esc(g.name)}</span><span class="sz"> ${seatSize(g)}人</span></span>`;
        }).join('')
      : '<span class="dist-empty">空桌</span>';
    return `<div class="dist-table">
      <div class="dist-header">
        <span class="tno">${esc(t.table_no)}</span>
        ${t.label ? `<span class="tlbl">${esc(t.label)}</span>` : ''}
        <span class="occ${occCls}">${t.occupied}/${t.effective_capacity}</span>
      </div>
      <div class="dist-guests">${guestsHtml}</div>
    </div>`;
  }).join('') || '<div class="empty-note">暂无桌子</div>';

  const chipsBox = document.getElementById('unassigned-chips');
  chipsBox.innerHTML = state.unassigned_guests.map(chipHtml).join('') ||
    '<div class="empty-note">没有未安排的宾客 🎉</div>';
  document.getElementById('unassigned-count').textContent = `（${state.stats.unseated} 人）`;

  bindFloorInteractions(venue, scale);
}

function bindFloorInteractions(venue, scale) {
  // 未安排宾客名牌：HTML5 拖拽到圆桌入座
  document.querySelectorAll('#unassigned-chips .chip').forEach(chip => {
    chip.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', chip.dataset.gid);
      e.dataTransfer.effectAllowed = 'move';
    });
  });

  venue.querySelectorAll('.table-dot').forEach(dot => {
    const no = dot.dataset.table;

    dot.addEventListener('dragover', e => { e.preventDefault(); dot.classList.add('dragover'); });
    dot.addEventListener('dragleave', () => dot.classList.remove('dragover'));
    dot.addEventListener('drop', e => {
      e.preventDefault();
      dot.classList.remove('dragover');
      const gid = parseInt(e.dataTransfer.getData('text/plain'), 10);
      if (!gid) return;
      const g = guestById(gid);
      if (!g || g.table_no === no) return;
      if (g.party_size > 1) openMoveModal(gid, no);
      else doMove(gid, no, true);
    });

    // 指针拖动摆位；位移极小视为点击 → 打开桌详情
    dot.addEventListener('pointerdown', e => {
      if (e.button !== 0) return;
      e.preventDefault();
      floorDragging = true;   // 拖动期间禁止 resize 重绘，否则 DOM 重建会中断拖拽
      const cfg = state.config, d = cfg.table_diameter;
      const start = { px: e.clientX, py: e.clientY, left: dot.offsetLeft, top: dot.offsetTop };
      let moved = false;
      dot.setPointerCapture(e.pointerId);

      const onMove = ev => {
        const dx = ev.clientX - start.px, dy = ev.clientY - start.py;
        if (!moved && Math.hypot(dx, dy) < 5) return;
        moved = true;
        dot.classList.add('dragging');
        const maxL = venue.clientWidth - d * scale, maxT = venue.clientHeight - d * scale;
        dot.style.left = Math.max(0, Math.min(maxL, start.left + dx)) + 'px';
        dot.style.top = Math.max(0, Math.min(maxT, start.top + dy)) + 'px';
      };
      const onUp = async () => {
        floorDragging = false;
        dot.removeEventListener('pointermove', onMove);
        dot.removeEventListener('pointerup', onUp);
        dot.classList.remove('dragging');
        if (!moved) { swapMode ? handleSwapClick(no) : openTableDetail(no); return; }
        const x = (dot.offsetLeft / scale) + d / 2;
        const y = (dot.offsetTop / scale) + d / 2;
        try {
          await api('PUT', `/api/tables/${encodeURIComponent(no)}/position`,
            { x: Math.round(x * 10) / 10, y: Math.round(y * 10) / 10 });
          await reload();
          toast(`桌「${no}」已摆放到 (${(Math.round(x * 10) / 10)}, ${Math.round(y * 10) / 10}) 米`);
        } catch (err) { toast(err.message, true); await reload(); }
      };
      dot.addEventListener('pointermove', onMove);
      dot.addEventListener('pointerup', onUp);
    });
  });
}

/* ---- 桌详情弹窗 ---- */
function openTableDetail(tableNo) {
  const t = tableByNo(tableNo);
  if (!t) return;
  const rows = t.guests.map(g => `
    <div class="detail-row">
      <span class="name">${esc(g.name)}</span>
      <span class="meta">占${seatSize(g)}座（预算${g.party_size}/确认${g.confirmed_size}）
        ${g.family_names ? '· ' + esc(g.family_names) : ''}</span>
      ${statusTag(g.confirm_status)}
      <button class="btn sm ghost" onclick="openMoveModal(${g.id})">换桌</button>
      <button class="btn sm ghost" onclick="openGuestModal(${g.id})">编辑</button>
    </div>`).join('') || '<div class="empty-note">空桌 — 从右侧「未安排宾客」拖名牌进来</div>';
  showModal(`
    <h3>${esc(t.table_no)} 桌${t.label ? '｜' + esc(t.label) : ''}
      <span style="font-weight:400;font-size:13px;color:var(--muted)">
        ${t.occupied}/${t.effective_capacity} 人${t.capacity === null ? '（默认容量）' : ''}
        ${t.x != null ? `· 位于 (${t.x}, ${t.y}) 米` : '· 未摆放（自动位置）'}
      </span></h3>
    <div>${rows}</div>
    <div class="modal-actions">
      <button class="btn ghost" onclick="openTableModal('${esc(t.table_no)}')">编辑桌子</button>
      <button class="btn ghost" onclick="openSwapModal('${esc(t.table_no)}')">调换座位</button>
      <button class="btn" onclick="closeModal()">关闭</button>
    </div>`);
}

function statusTag(st) {
  if (st === '已确认') return '<span class="tag ok">已确认</span>';
  if (st === '待确认') return '<span class="tag pending">待确认</span>';
  if (st === '不参加') return '<span class="tag bad">不参加</span>';
  return `<span class="tag plain">${esc(st)}</span>`;
}

function inlineSelect(g, field, options) {
  return `<select class="inline" onchange="quickUpdate(${g.id}, '${field}', this.value)">` +
    options.map(o => `<option${o === g[field] ? ' selected' : ''}>${o}</option>`).join('') +
    '</select>';
}

const selectedIds = new Set();

function toggleSelectAll(checked) {
  const kw = (document.getElementById('guest-search').value || '').trim().toLowerCase();
  const visible = state.guests.filter(g => !kw || [g.name, g.family_names, g.note, g.table_no]
    .some(v => String(v).toLowerCase().includes(kw)));
  selectedIds.clear();
  if (checked) visible.forEach(g => selectedIds.add(g.id));
  renderGuestsTable();
  updateBatchBar();
}

function toggleSelect(gid) {
  if (selectedIds.has(gid)) selectedIds.delete(gid); else selectedIds.add(gid);
  updateBatchBar();
}

function clearSelection() {
  selectedIds.clear();
  const sa = document.getElementById('select-all');
  if (sa) sa.checked = false;
  renderGuestsTable();
  updateBatchBar();
}

function updateBatchBar() {
  const bar = document.getElementById('batch-bar');
  const n = selectedIds.size;
  bar.style.display = n ? 'flex' : 'none';
  document.getElementById('batch-count').textContent = `已选 ${n} 组宾客`;
}

let guestSort = { field: '', asc: true };
function sortGuests(field) {
  if (guestSort.field === field) guestSort.asc = !guestSort.asc;
  else { guestSort.field = field; guestSort.asc = true; }
  renderGuestsTable();
}

function renderGuestsTable() {
  const kw = (document.getElementById('guest-search').value || '').trim().toLowerCase();
  const filter = document.getElementById('guest-filter')?.value || '';
  let list = state.guests.filter(g => {
    if (kw && ![g.name, g.family_names, g.note, g.table_no].some(v => String(v).toLowerCase().includes(kw))) return false;
    if (filter === 'unseated') return !g.table_no;
    if (filter === 'seated') return !!g.table_no;
    if (filter === '已确认' || filter === '待确认' || filter === '不参加') return g.confirm_status === filter;
    return true;
  });
  if (guestSort.field) {
    const f = guestSort.field, dir = guestSort.asc ? 1 : -1;
    list = list.slice().sort((a, b) => {
      let va = a[f] ?? '', vb = b[f] ?? '';
      if (f === 'table_no') {
        if (!va && !vb) return 0;
        if (!va) return 1;
        if (!vb) return -1;
        return String(va).localeCompare(String(vb), 'zh', { numeric: true }) * dir;
      }
      if (typeof va === 'number') return (va - vb) * dir;
      return String(va).localeCompare(String(vb), 'zh') * dir;
    });
  }
  document.querySelectorAll('#guests-table th.sortable').forEach(th => {
    const s = th.dataset.sort, arrow = th.querySelector('.sort-arrow');
    if (arrow) arrow.remove();
    if (s === guestSort.field)
      th.insertAdjacentHTML('beforeend', `<span class="sort-arrow"> ${guestSort.asc ? '↑' : '↓'}</span>`);
  });
  const rows = list.map(g => `
      <tr>
        <td><input type="checkbox" ${selectedIds.has(g.id) ? 'checked' : ''} onchange="toggleSelect(${g.id})"></td>
        <td><b>${esc(g.name)}</b></td>
        <td>${g.party_size}</td>
        <td>${g.confirm_status === '已确认'
              ? `<b style="color:var(--ok)">${g.confirmed_size}</b>`
              : `<span style="color:var(--muted)">${g.confirmed_size}</span>`}</td>
        <td>${esc(g.family_names) || '<span style="color:var(--muted)">—</span>'}</td>
        <td>${g.table_no ? esc(g.table_no) : '<span class="tag plain">未安排</span>'}</td>
        <td>${inlineSelect(g, 'invite_status', ['未发送', '已发送'])}</td>
        <td>${inlineSelect(g, 'confirm_status', ['待确认', '已确认', '不参加'])}</td>
        <td>${esc(g.note)}</td>
        <td><div class="ops">
          <button class="btn sm ghost" onclick="openGuestModal(${g.id})">编辑</button>
          <button class="btn sm ghost" onclick="openMoveModal(${g.id})">换桌</button>
          <button class="btn sm danger" onclick="removeGuest(${g.id})">删除</button>
        </div></td>
      </tr>`).join('');
  document.querySelector('#guests-table tbody').innerHTML =
    rows || '<tr><td colspan="10" style="color:var(--muted)">暂无宾客，点击「新增宾客」开始录入</td></tr>';
}

function renderTablesTable() {
  const rows = state.tables.map(t => `
    <tr>
      <td><b>${esc(t.table_no)}</b></td>
      <td>${esc(t.label)}</td>
      <td>${t.capacity === null ? `<span class="tag plain">默认（${state.config.default_capacity}）</span>` : t.capacity}</td>
      <td>${t.occupied > t.effective_capacity
            ? `<span class="tag bad">${t.occupied}/${t.effective_capacity} 超员</span>`
            : `${t.occupied}/${t.effective_capacity}`}</td>
      <td><div class="ops">
        <button class="btn sm ghost" onclick="openTableModal('${esc(t.table_no)}')">编辑</button>
        <button class="btn sm ghost" onclick="openSwapModal('${esc(t.table_no)}')">调换</button>
        <button class="btn sm danger" onclick="removeTable('${esc(t.table_no)}')">删除</button>
      </div></td>
    </tr>`).join('');
  document.querySelector('#tables-table tbody').innerHTML =

}

/* ================= 弹窗 ================= */

function showModal(html) {
  document.getElementById('modal').innerHTML = html;
  document.getElementById('modal-backdrop').classList.add('show');
}
function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('show');
}
document.getElementById('modal-backdrop').addEventListener('click', e => {
  if (e.target.id === 'modal-backdrop') closeModal();
});

function tableOptions(selected, includeNew) {
  let html = `<option value=""${!selected ? ' selected' : ''}>（未安排）</option>` +
    state.tables.map(t => {
      const label = `${t.table_no}${t.label ? '｜' + t.label : ''}（${t.occupied}/${t.effective_capacity}）`;
      return `<option value="${esc(t.table_no)}"${t.table_no === selected ? ' selected' : ''}>${esc(label)}</option>`;
    }).join('');
  if (includeNew) html += `<option value="__new__">＋ 新建桌子…</option>`;
  return html;
}

function newTableFieldsHtml(prefix) {
  return `<div id="${prefix}-new-fields" class="form-grid" style="display:none">
    <div class="form-row"><label>新桌号 *</label>
      <input id="${prefix}-new-no" value="${nextTableNo()}"></div>
    <div class="form-row"><label>容纳人数（留空 = 默认 ${state.config.default_capacity}）</label>
      <input id="${prefix}-new-cap" type="number" min="1" placeholder="默认 ${state.config.default_capacity}"></div>
    <div class="form-row full"><label>备注名</label>
      <input id="${prefix}-new-label" placeholder="如：男方亲戚、大学同学"></div>
  </div>`;
}

function onTableSelectChange(selectId, prefix) {
  const fields = document.getElementById(prefix + '-new-fields');
  if (document.getElementById(selectId).value === '__new__') {
    fields.style.display = '';
    document.getElementById(prefix + '-new-no').focus();
  } else {
    fields.style.display = 'none';
  }
}

async function resolveTableTarget(selectId, prefix) {
  const val = document.getElementById(selectId).value;
  if (val !== '__new__') return val;
  const no = document.getElementById(prefix + '-new-no').value.trim();
  if (!no) { toast('请填写新桌号', true); return null; }
  const capRaw = document.getElementById(prefix + '-new-cap').value.trim();
  try {
    await api('POST', '/api/tables', {
      table_no: no,
      label: document.getElementById(prefix + '-new-label').value.trim(),
      capacity: capRaw ? parseInt(capRaw, 10) : null,
      x: null, y: null,
    });
    await reload();
    return no;
  } catch (e) { toast(e.message, true); return null; }
}

async function saveGuest(gid) {
  const confirmedRaw = document.getElementById('gm-confirmed-size').value.trim();
  const body = {
    name: document.getElementById('gm-name').value.trim(),
    party_size: parseInt(document.getElementById('gm-size').value, 10) || 1,
    confirmed_size: confirmedRaw === '' ? null : parseInt(confirmedRaw, 10),
    family_names: document.getElementById('gm-family').value.trim(),
    table_no: document.getElementById('gm-table').value,
    invite_status: document.getElementById('gm-invite').value,
    confirm_status: document.getElementById('gm-confirm').value,
    note: document.getElementById('gm-note').value.trim(),
  };
  if (!body.name) { toast('请填写姓名', true); return; }
  try {
    await apiWithForce(gid ? 'PUT' : 'POST', gid ? `/api/guests/${gid}` : '/api/guests', body);
    closeModal();
    await reload();
    toast(gid ? '已保存' : '已新增宾客');
  } catch (e) { toast(e.message, true); }
}

function batchSetField(field, options, label) {
  const opts = options.map(o => `<option value="${o}">${o}</option>`).join('');

async function submitBatch(fields) {
  try {
    const r = await api('PATCH', '/api/guests/batch', { ids: [...selectedIds], ...fields });
    closeModal();
    clearSelection();
    await reload();
    toast(`已更新 ${r.updated} 组宾客`);
  } catch (e) { toast(e.message, true); }
}

async function batchDelete() {
  const count = selectedIds.size;
  if (!confirm(`确定删除选中的 ${count} 组宾客？此操作不可撤销。`)) return;
  try {
    for (const gid of selectedIds) {
      await api('DELETE', `/api/guests/${gid}`);
    }
    clearSelection();
    await reload();
    toast(`已删除 ${count} 组宾客`);
  } catch (e) { toast(e.message, true); await reload(); }
}

      <button class="btn ghost" onclick="closeModal()">取消</button>
      <button class="btn" onclick="submitImport()">开始导入</button>
    </div>`);
}

async function submitImport() {
  const file = document.getElementById('im-file').files[0];
  if (!file) { toast('请先选择 .xlsx 文件', true); return; }
  const mode = document.querySelector('input[name="im-mode"]:checked').value;
  if (mode === 'replace' &&
      !confirm(`覆盖模式将删除现有全部 ${state.guests.length} 组宾客，再导入新名单。\n确定继续？`)) return;
  try {
    const res = await fetch(`/api/guests/import?mode=${mode}`, { method: 'POST', body: file });
    if (!res.ok) {
      let detail = res.statusText;
      try { detail = (await res.json()).detail || detail; } catch (e) {}
      throw new Error(detail);
    }
    const r = await res.json();
    closeModal();
    await reload();
    toast(`已导入 ${r.imported} 组宾客` +
      (r.skipped ? `，跳过 ${r.skipped} 行（姓名为空）` : '') +
      (r.created_tables.length ? `，自动新建桌：${r.created_tables.join('、')}` : ''));
  } catch (e) { toast('导入失败：' + e.message, true); }
}

/* ---- 桌子交换宾客 ---- */
let swapMode = false, swapSource = null;

function toggleSwapMode() {
  swapMode = !swapMode;
  swapSource = null;
  const btn = document.getElementById('swap-mode-btn');
  btn.classList.toggle('active-mode', swapMode);
  document.querySelectorAll('.table-dot.swap-source').forEach(d => d.classList.remove('swap-source'));
  if (swapMode) toast('调换模式：点击第一张桌选中，再点击第二张桌完成调换。再次点击按钮退出。');
}

function handleSwapClick(tableNo) {
  if (!swapSource) {
    swapSource = tableNo;
    document.querySelector(`.table-dot[data-table="${CSS.escape(tableNo)}"]`)?.classList.add('swap-source');
  } else if (swapSource === tableNo) {
    document.querySelector(`.table-dot[data-table="${CSS.escape(tableNo)}"]`)?.classList.remove('swap-source');
    swapSource = null;
  } else {
    doSwapTables(swapSource, tableNo);
  }
}

function openSwapModal(tableNo) {
  const t = tableByNo(tableNo);
  if (!t) return;
  const others = state.tables.filter(x => x.table_no !== tableNo);
  if (!others.length) { toast('没有其他桌子可调换', true); return; }
  const opts = others.map(x => {
    const lbl = `${x.table_no}${x.label ? '｜' + x.label : ''}（${x.occupied}/${x.effective_capacity}）`;
    return `<option value="${esc(x.table_no)}">${esc(lbl)}</option>`;
  }).join('');
  showModal(`
    <h3>调换座位：${esc(t.table_no)} 桌${t.label ? '｜' + esc(t.label) : ''}</h3>
    <div class="sub" style="margin-bottom:12px">桌号与位置不变，调换两桌的备注名、容量和全部宾客。</div>
    <div class="form-row"><label>与哪张桌调换</label>
      <select id="swap-target">${opts}</select></div>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeModal()">取消</button>
      <button class="btn" onclick="doSwapTables('${esc(tableNo)}', document.getElementById('swap-target').value)">确定调换</button>
    </div>`);
}

async function doSwapTables(tableA, tableB) {
  try {
    await api('POST', '/api/tables/swap', { table_a: tableA, table_b: tableB });
    closeModal();
    swapSource = null;
    if (swapMode) toggleSwapMode();
    await reload();
    toast(`${tableA} 桌 ⇄ ${tableB} 桌 已调换`);
  } catch (e) { toast(e.message, true); }
}

/* ---- 桌子新增 / 编辑 ---- */
// 下一个可用的数字桌号（现有最大值 + 1，跳过含「4」的数字，婚礼习俗避 4）
function nextTableNo() {
  const nums = state.tables.map(t => /^\d+$/.test(t.table_no) ? parseInt(t.table_no, 10) : 0);
  let n = Math.max(0, ...nums) + 1;
  while (String(n).includes('4')) n++;
  return String(n);
}

function nextTableNos(count) {
  const nums = state.tables.map(t => /^\d+$/.test(t.table_no) ? parseInt(t.table_no, 10) : 0);
  let n = Math.max(0, ...nums) + 1;
  const result = [];
  while (result.length < count) {
    while (String(n).includes('4')) n++;
    result.push(String(n));
    n++;
  }
  return result;
}

function onTableCountChange() {
  const count = parseInt(document.getElementById('tm-count').value, 10) || 1;
  const noRow = document.getElementById('tm-no-row');
  const preview = document.getElementById('tm-preview');
  if (count > 1) {
    noRow.style.display = 'none';
    const nos = nextTableNos(count);
    preview.style.display = '';
    preview.innerHTML = `<label>将创建桌号</label><div class="sub">${nos.join('、')}</div>`;
  } else {
    noRow.style.display = '';
    preview.style.display = 'none';
  }
}

function openTableModal(tableNo) {
  const t = tableNo ? tableByNo(tableNo) : null;
  const isNew = !t;
  showModal(`
    <h3>${t ? `编辑桌子「${esc(t.table_no)}」` : '新增桌子'}</h3>
    <div class="form-grid">
      ${isNew ? `<div class="form-row"><label>数量</label>
        <input id="tm-count" type="number" min="1" max="50" value="1"
               oninput="onTableCountChange()"></div>` : ''}
      <div class="form-row" id="tm-no-row"><label>桌号 *（如 1、2 或 主桌）</label>
        <input id="tm-no" value="${esc(t?.table_no ?? nextTableNo())}"></div>
      <div class="form-row full" id="tm-preview" style="display:none"></div>
      <div class="form-row"><label>容纳人数（留空 = 默认 ${state.config.default_capacity} 人）</label>
        <input id="tm-cap" type="number" min="1" value="${t?.capacity ?? ''}" placeholder="默认 ${state.config.default_capacity}"></div>
      <div class="form-row full"><label>备注名（如：男方亲戚、大学同学）</label>
        <input id="tm-label" value="${esc(t?.label ?? '')}"></div>
    </div>
    <div class="modal-actions">
      ${t ? `<button class="btn danger" style="margin-right:auto" onclick="removeTable('${esc(t.table_no)}')">删除此桌</button>` : ''}
      <button class="btn ghost" onclick="closeModal()">取消</button>
      <button class="btn" onclick="saveTable(${t ? `'${esc(t.table_no)}'` : 'null'})">保存</button>
    </div>`);
  document.getElementById('tm-no').focus();
}

async function saveTable(origNo) {
  const capRaw = document.getElementById('tm-cap').value.trim();
  const label = document.getElementById('tm-label').value.trim();
  const capacity = capRaw ? parseInt(capRaw, 10) : null;

  const countEl = document.getElementById('tm-count');
  const count = (!origNo && countEl) ? (parseInt(countEl.value, 10) || 1) : 1;

  if (count > 1) {
    const nos = nextTableNos(count);
    try {
      for (const no of nos) {
        await api('POST', '/api/tables', { table_no: no, label, capacity, x: null, y: null });
      }
      closeModal();
      await reload();
      toast(`已新增 ${nos.length} 张桌子（${nos[0]} ~ ${nos[nos.length - 1]}）`);
    } catch (e) { toast(e.message, true); await reload(); }
    return;
  }

  const orig = origNo ? tableByNo(origNo) : null;
  const body = {
    table_no: document.getElementById('tm-no').value.trim(),
    label, capacity,
    x: orig?.x ?? null,
    y: orig?.y ?? null,
  };
  if (!body.table_no) { toast('请填写桌号', true); return; }
  try {
    await api(origNo ? 'PUT' : 'POST',
      origNo ? `/api/tables/${encodeURIComponent(origNo)}` : '/api/tables', body);
    closeModal();
    await reload();
    toast('已保存');
  } catch (e) { toast(e.message, true); }
}

async function resetPositions() {
  if (!confirm('将清除所有桌子的手动摆放位置，恢复按桌号从左到右的自动排列。\n确定重新排列？')) return;
  try {
    await api('POST', '/api/tables/reset-positions');
    await reload();
    toast('已按桌号重新排列全部桌子');
  } catch (e) { toast(e.message, true); }
}

async function removeTable(tableNo) {
  const t = tableByNo(tableNo);
  const warn = t.guests.length
    ? `该桌上有 ${t.guests.length} 组宾客（${t.occupied} 人），删除后他们将移入「未安排」区。\n`
    : '';
  if (!confirm(`${warn}确定删除桌「${tableNo}」？`)) return;
  try {
    await api('DELETE', `/api/tables/${encodeURIComponent(tableNo)}`);
    closeModal();
    await reload();
    toast('已删除桌子');
  } catch (e) { toast(e.message, true); }
}

/* ---- 设置 ---- */
async function saveConfig() {
  const body = {
    wedding_date: document.getElementById('cfg-wedding-date').value.trim() || '10.25',
    default_capacity: parseInt(document.getElementById('cfg-capacity').value, 10),
    budget_total: parseInt(document.getElementById('cfg-budget').value, 10),
    venue_width: parseFloat(document.getElementById('cfg-venue-width').value),
    venue_depth: parseFloat(document.getElementById('cfg-venue-depth').value),
    table_diameter: parseFloat(document.getElementById('cfg-table-diameter').value),
    table_gap: parseFloat(document.getElementById('cfg-table-gap').value),
  };
  if (!body.default_capacity || body.default_capacity < 1) { toast('默认容量至少为 1', true); return; }
  if (isNaN(body.budget_total) || body.budget_total < 0) { toast('人数预算不能为负', true); return; }
  if (!(body.venue_width > 0) || !(body.venue_depth > 0)) { toast('会场长宽必须大于 0', true); return; }
  if (!(body.table_diameter > 0)) { toast('桌子直径必须大于 0', true); return; }
  if (isNaN(body.table_gap) || body.table_gap < 0) { toast('桌子间距不能为负', true); return; }
  try {
    await api('PUT', '/api/config', body);
    await reload();
    toast('设置已保存');
  } catch (e) { toast(e.message, true); }
}

/* ================= 启动 ================= */
let resizeTimer = null;
let floorDragging = false;  // 圆桌拖动中，见 bindFloorInteractions
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { if (state && !floorDragging) renderFloor(); }, 200);
});
reload().catch(e => toast('加载失败：' + e.message, true));
</script>
</body>
</html>
